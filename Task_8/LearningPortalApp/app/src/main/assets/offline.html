<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Learning Portal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #5e35b1 0%, #1e88e5 100%);
            color: #ffffff;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 20px;
            padding: 28px 22px;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .icon {
            font-size: 58px;
            line-height: 1;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            margin: 0;
            font-size: 16px;
            line-height: 1.5;
            color: #f4f7ff;
        }

        .tip {
            margin-top: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            line-height: 1.45;
        }

        @media (max-width: 420px) {
            .card {
                padding: 24px 18px;
                border-radius: 16px;
            }

            .icon {
                font-size: 52px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="icon">📡</div>
        <h1>No Internet Connection</h1>
        <p>
            The Learning Portal cannot reach the website right now. Please check your connection and
            try again.
        </p>
        <div class="tip">
            Tip: Turn on mobile data or reconnect to Wi-Fi, then tap refresh in the browser toolbar.
        </div>
    </main>
</body>
</html>
